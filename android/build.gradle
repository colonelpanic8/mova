// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    // KSP is needed by the androidx.appfunctions compiler (see android/app/build.gradle).
    // The version is pinned to the Kotlin version that Expo/React Native resolves
    // (Kotlin 2.1.20 -> KSP 2.1.20-2.0.1). If the RN/Expo Kotlin version changes, bump
    // this to the matching KSP release, otherwise the KSP plugin will refuse to load.
    classpath("com.google.devtools.ksp:symbol-processing-gradle-plugin:2.1.20-2.0.1")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Apply packaging options to all library projects to avoid duplicate native libs in androidTest
subprojects { subproject ->
    subproject.plugins.withId('com.android.library') {
        subproject.android {
            packagingOptions {
                pickFirst '**/libfbjni.so'
                pickFirst '**/libc++_shared.so'
            }
        }
    }
}
