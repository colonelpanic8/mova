name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - "feat/**"
      - "fix/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set up release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/mova-upload.keystore"
            {
              echo "MOVA_UPLOAD_STORE_FILE=$RUNNER_TEMP/mova-upload.keystore"
              echo "MOVA_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "MOVA_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "MOVA_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            echo "Release keystore configured from secrets."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret available; release APKs will be signed with the debug keystore."
          fi

      - name: Build Android Release APKs
        working-directory: android
        run: ./gradlew :app:assembleRelease :wear:assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mova-release-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/wear/build/outputs/apk/release/wear-release.apk
          retention-days: 14
